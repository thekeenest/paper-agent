# Docker Compose for Paper-Agent v2
# Run: docker-compose up --build
# Frontend: http://localhost:3000  (v2 UI — leaderboard, trace, KG explorer)
# v1 API:   http://localhost:8000
# v2 API:   http://localhost:8001

version: '3.8'

services:

  # ── v1 backend (original pipeline + WebSocket task manager) ──────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./output:/app/output
      - ./data:/app/data
      - ./experiments:/app/experiments
      - ./benchmark:/app/benchmark
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── v2 research API (leaderboard / trace / KG subgraph) ──────────────────
  backend-v2:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uvicorn src.v2.api.app:app
      --host 0.0.0.0 --port 8001 --workers 2
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - KG_DB_PATH=/app/output/v2/kg
      - REPORTS_CACHE=/app/experiments/final/reports_cache.json
      - BENCH_OUTPUT_DIR=/app/output/eval
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./output:/app/output
      - ./experiments:/app/experiments
      - ./benchmark:/app/benchmark
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v2/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── frontend (React/Vite — leaderboard, trace viewer, KG explorer) ────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://backend-v2:8001
    ports:
      - "3000:80"
    depends_on:
      backend-v2:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://backend-v2:8001

networks:
  default:
    name: conf-agent-network
